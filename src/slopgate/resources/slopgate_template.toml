# Quality Gate Configuration
# slopgate lint

[slopgate]
version = "{version}"

[paths]
# Single directory or array of roots scanned by `slopgate lint check`.
src = "src"
tests = "tests"
# src = ["src", "automation", "cloud", "scripts"]
# Known-debt inventory (stable_id lists per rule) — fix queue, not a waiver. Relative to repo root.
baseline_path = "baselines.json"
exclude_dirs = [".venv", "venv", "env", "__pycache__", "node_modules", ".git"]
exclude_patterns = ["*_pb2.py", "*_pb2_grpc.py", "*_pb2.pyi"]

[thresholds]
max_complexity = 12
max_params = 4
max_method_lines = 50
max_test_lines = 35
max_module_lines_soft = 350
max_module_lines_hard = 600
max_line_length = 120
max_nesting_depth = 4
max_god_class_methods = 15
max_god_class_lines = 400
max_eager_test_calls = 7
max_repeated_magic_numbers = 5
max_repeated_string_literals = 10
max_scattered_helpers = 5
max_duplicate_helper_signatures = 10
max_repeated_code_patterns = 50
min_function_body_lines = 5
min_call_sequence_length = 3
feature_envy_threshold = 0.60
feature_envy_min_accesses = 6

[magic_values]
allowed_numbers = [0, 1, 2, 3, 4, 5, -1, 10, 100, 200, 255, 1000, 1024, 0.5]
allowed_strings = [
    "",
    " ",
    "\n",
    "\t",
    "utf-8",
    "r",
    "w",
    "rb",
    "wb",
    "GET",
    "POST",
    "PUT",
    "DELETE",
    "PATCH",
    "id",
    "name",
    "type",
    "value",
    "text",
    "status",
]

[wrappers]
allowed = []

[logging]
logger_function = ""
logger_variable = "logger"
infrastructure_path = ""
disallowed_names = ["_log", "_logger", "log", "LOG"]

[type_safety]
ban_any = true
ban_type_suppressions = true

[exception_safety]
ban_broad_except_swallow = true
ban_silent_except = true
ban_silent_fallback = true

[test_smells]
ban_conditional_assertions = true
ban_fixtures_outside_conftest = true
max_consecutive_bare_asserts = 3

[deprecated_patterns]
patterns = [
    ["from typing import Optional", "Optional[X] → X | None"],
    ["from typing import Union", "Union[X, Y] → X | Y"],
    ["from typing import List\\b", "List[X] → list[X]"],
    ["from typing import Dict\\b", "Dict[K, V] → dict[K, V]"],
    ["from typing import Tuple\\b", "Tuple[X] → tuple[X]"],
    ["from typing import Set\\b", "Set[X] → set[X]"],
]

[scope]
default = "all"

# Optional repo-local runtime overrides for hook-time enforcement.
# These override machine-level defaults only for this managed repo.

[enabled_rules]
# "GIT-001" = true

[enabled_cli_rules]
# Batch lint collector toggles. Missing entries default to enabled.
# "long-method" = true
# "possibly-dead-internal" = true  # Opt-in private-module candidate review.
# Legacy "untested-production-code" maps only to "untested-public-api".

# Optional first-class surface overrides. Missing values inherit defaults.
# Hook events constrain where the rule may evaluate; actions are allow, ask,
# deny, block, context, or warn. CLI enablement is applied to mapped collectors.
#
# [rule_surfaces."PY-LOG-001".hook]
# enabled = true
# events = ["PreToolUse"]
# action = "deny"
#
# [rule_surfaces."PY-LOG-001".cli]
# enabled = true

[post_edit_quality]
# enabled = true
# block_on_failure = true

[post_edit_quality.commands_by_language]
# python = ["python -m pytest -q tests/quality"]

[hook_guidance]
# Optional response wording hints for hook recovery messages.
project_logger_import = ""
project_logger_usage = ""
quality_check_command = "slopgate lint check"

[async_jobs]
# enabled = false

[async_jobs.commands_by_language]
# python = ["python -m pytest -q tests/quality"]
